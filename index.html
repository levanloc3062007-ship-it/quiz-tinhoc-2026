let questions=[];

function shuffle(a){return a.sort(()=>Math.random()-0.5);};

function startQuiz(type){
questions = shuffle(data[type]);
loadQuiz();
}

function loadQuiz(){
let quiz=document.getElementById("quiz");
quiz.innerHTML="";
questions.forEach((q,i)=>{
let answers=shuffle([...q.a]);
let html=`<div class="question"><h3>Câu ${i+1}: ${q.q}</h3>`;
answers.forEach(ans=>{
html+=`<label><input type="radio" name="q${i}" value="${ans}"> ${ans}</label><br>`;
});
html+=`<div id="m${i}"></div></div>`;
quiz.innerHTML+=html;
});
}

function submitQuiz(){
let score=0;
questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name="q${i}"]:checked`);
let m=document.getElementById(`m${i}`);
if(sel && sel.value===q.correct){
score++; m.innerHTML="Đ"; m.className="correct";
} else {
m.innerHTML="S"; m.className="wrong";
}
});
document.getElementById("result").innerText=`Bạn đúng ${score}/${questions.length}`;
}
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trắc nghiệm</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
    }
    .question {
        margin-bottom: 20px;
    }
    .option {
        display: block;
        padding: 8px;
        margin: 5px 0;
        border: 1px solid #ccc;
        cursor: pointer;
    }
    .correct {
        background-color: #4CAF50;
        color: white;
    }
    .wrong {
        background-color: #f44336;
        color: white;
    }
</style>
</head>

<body>

<h2>Quiz trắc nghiệm</h2>
<div id="quiz"></div>
<button onclick="checkAnswers()">Nộp bài</button>

<script>
// Dữ liệu mẫu (bạn có thể thêm từ file của bạn)
let questions = [
    {
        question: "Thiết bị nào là bộ não máy tính?",
        answers: ["RAM", "ROM", "CPU", "Ổ cứng"],
        correct: "CPU"
    },
    {
        question: "Phím tắt copy là gì?",
        answers: ["Ctrl + X", "Ctrl + C", "Ctrl + V", "Ctrl + Z"],
        correct: "Ctrl + C"
    },
    {
        question: "RAM dùng để làm gì?",
        answers: [
            "Lưu lâu dài",
            "Xử lý",
            "Lưu tạm thời",
            "Hiển thị"
        ],
        correct: "Lưu tạm thời"
    }
];

// Xáo trộn mảng
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

// Xáo trộn câu hỏi
questions = shuffle(questions);

// Hiển thị
function loadQuiz() {
    let quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");

        let title = document.createElement("h3");
        title.innerText = (index + 1) + ". " + q.question;
        div.appendChild(title);

        let shuffledAnswers = shuffle([...q.answers]);

        shuffledAnswers.forEach(answer => {
            let btn = document.createElement("div");
            btn.classList.add("option");
            btn.innerText = answer;

            btn.onclick = () => {
                let options = div.querySelectorAll(".option");
                options.forEach(o => o.classList.remove("selected"));
                btn.classList.add("selected");
            };

            div.appendChild(btn);
        });

        quizDiv.appendChild(div);
    });
}

// Kiểm tra
function checkAnswers() {
    let allQuestions = document.querySelectorAll(".question");

    allQuestions.forEach((qDiv, index) => {
        let selected = qDiv.querySelector(".selected");
        let options = qDiv.querySelectorAll(".option");

        options.forEach(o => {
            o.classList.remove("correct", "wrong");
        });

        options.forEach(o => {
            if (o.innerText === questions[index].correct) {
                o.classList.add("correct");
            }
        });

        if (selected) {
            if (selected.innerText === questions[index].correct) {
                selected.classList.add("correct");
            } else {
                selected.classList.add("wrong");
            }
        }
    });
}

loadQuiz();
</script>

</body>
</html>
